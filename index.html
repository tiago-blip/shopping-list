<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Move-In Budget</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f2f2f7;
    --surface: #ffffff;
    --surface2: #f2f2f7;
    --ink: #1c1c1e;
    --ink2: #3a3a3c;
    --muted: #8e8e93;
    --line: rgba(60,60,67,0.12);
    --blue: #007aff;
    --blue-bg: #e8f1ff;
    --green: #34c759;
    --red: #ff3b30;
    --red-bg: rgba(255,59,48,0.08);
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --surface: #1c1c1e;
      --surface2: #2c2c2e;
      --ink: #ffffff;
      --ink2: #ebebf5;
      --muted: #8e8e93;
      --line: rgba(255,255,255,0.1);
      --blue-bg: rgba(0,122,255,0.15);
      --red-bg: rgba(255,59,48,0.12);
    }
    .item-wrap.purchased { background: rgba(52,199,89,0.07); }
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Google Sans", Roboto, "Helvetica Neue", sans-serif;
    font-size: 17px;
    min-height: 100vh;
    padding: 0 0 calc(100px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Header ── */
  .app-header {
    background: rgba(242,242,247,0.92);
    border-bottom: 1px solid var(--line);
    padding: max(52px, calc(16px + env(safe-area-inset-top))) 20px 16px;
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
  }
  @media (prefers-color-scheme: dark) { .app-header { background: rgba(28,28,30,0.92); } }
  @supports not (backdrop-filter: blur(1px)) { .app-header { background: var(--bg); } }
  .app-header-inner { max-width: 680px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .app-title { font-size: clamp(1.5rem, 5vw, 2rem); font-weight: 700; letter-spacing: -0.03em; color: var(--ink); flex-shrink: 0; }
  #list-title { border-radius: 6px; padding: 2px 6px; margin: -2px -6px; outline: none; transition: background 0.15s; cursor: text; }
  #list-title:hover, #list-title:focus { background: rgba(120,120,128,0.12); }

  .auth-area { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .auth-email { font-size: 12px; color: var(--muted); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .header-btn { font-size: 13px; font-weight: 600; border: none; border-radius: 20px; padding: 6px 14px; cursor: pointer; font-family: inherit; white-space: nowrap; transition: opacity 0.15s; }
  .header-btn:hover { opacity: 0.75; }
  .share-btn { color: var(--ink2); background: var(--surface2); }
  .signin-btn { color: var(--blue); background: var(--blue-bg); }
  .signout-btn { color: var(--muted); background: var(--surface2); font-weight: 400; font-size: 12px; }
  .settings-btn { background: var(--surface2); border: none; border-radius: 20px; padding: 6px 10px; cursor: pointer; font-size: 15px; line-height: 1; transition: opacity 0.15s; }
  .settings-btn:hover { opacity: 0.75; }
  .undo-btn { font-size: 13px; font-weight: 400; color: var(--muted); background: transparent; border: none; border-radius: 20px; padding: 6px 10px; cursor: pointer; font-family: inherit; white-space: nowrap; transition: all 0.15s; }
  .undo-btn:hover { color: var(--ink); background: var(--surface2); }

  .container { max-width: 680px; margin: 0 auto; padding: 24px 16px 0; }
  .hint { font-size: 13px; color: var(--muted); margin-bottom: 20px; padding: 0 4px; }

  /* ── Sign-in screen ── */
  .signin-screen { display: flex; flex-direction: column; align-items: center; padding: 80px 20px; text-align: center; }
  .signin-screen h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
  .signin-screen p { font-size: 15px; color: var(--muted); margin-bottom: 32px; max-width: 280px; line-height: 1.5; }
  .google-btn { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1.5px solid var(--line); border-radius: 12px; padding: 13px 24px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; color: var(--ink); transition: background 0.15s; }
  .google-btn:hover { background: var(--surface2); }

  /* ── Settings modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
  .modal { background: var(--surface); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto; }
  .modal-title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
  .modal-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 24px; line-height: 1.4; }
  .settings-group { margin-bottom: 20px; }
  .settings-group-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; padding: 0 2px; }
  .settings-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .settings-field:last-child { margin-bottom: 0; }
  .settings-field label { font-size: 13px; font-weight: 500; color: var(--ink2); }
  .settings-field input { background: var(--surface2); border: 1.5px solid var(--line); border-radius: var(--radius-sm); padding: 10px 12px; font-family: inherit; font-size: 15px; color: var(--ink); transition: border-color 0.15s; }
  .settings-field input:focus { outline: none; border-color: var(--blue); }
  .settings-field input::placeholder { color: var(--muted); }
  .settings-note { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.4; }
  .settings-note a { color: var(--blue); }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
  .btn-primary { background: var(--blue); color: white; border: none; border-radius: var(--radius-sm); padding: 10px 20px; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn-primary:hover { background: #0066d6; }
  .btn-cancel { background: var(--surface2); color: var(--ink2); border: none; border-radius: var(--radius-sm); padding: 10px 20px; font-family: inherit; font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .btn-cancel:hover { opacity: 0.75; }
  .settings-saved { font-size: 13px; color: var(--green); font-weight: 500; align-self: center; margin-right: auto; }

  /* ── Section ── */
  .section { margin-bottom: 32px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 0 4px 8px; }
  .section-label { font-size: 13px; font-weight: 600; letter-spacing: 0.01em; color: var(--muted); text-transform: uppercase; border-radius: 4px; padding: 2px 5px; margin: -2px -5px; outline: none; cursor: text; transition: background 0.15s; }
  .section-label:hover, .section-label:focus { background: rgba(120,120,128,0.12); }
  .delete-section-btn { font-size: 13px; color: var(--red); background: none; border: none; cursor: pointer; padding: 2px 0; opacity: 0.7; transition: opacity 0.15s; font-family: inherit; }
  .delete-section-btn:hover { opacity: 1; }
  .section-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; }

  /* ── Item ── */
  .item-wrap { border-bottom: 1px solid var(--line); }
  .item-wrap:last-child { border-bottom: none; }
  .item { display: grid; grid-template-columns: auto auto 1fr auto auto auto auto auto; align-items: center; gap: 8px; padding: 13px 16px; }

  .item-toggle {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--line);
    background: transparent; cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; transition: all 0.2s; color: transparent;
    font-size: 13px; position: relative;
  }
  .item-toggle::after { content: ''; position: absolute; inset: -10px; }
  .item-toggle:hover { border-color: var(--green); }
  .item-toggle.purchased { background: var(--green); border-color: var(--green); color: white; }
  .item-wrap.purchased { background: rgba(52,199,89,0.05); }

  .item-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }

  .item-name-input {
    font-size: 17px; font-family: inherit; background: transparent;
    border: none; color: var(--ink); width: 100%; padding: 0;
  }
  .item-name-input:focus { outline: none; }
  .item-name-input.purchased { color: var(--muted); }
  .item-name-link { font-size: 17px; color: var(--blue); text-decoration: none; }
  .item-name-link:hover { text-decoration: underline; }
  .item-name-link.purchased { color: var(--muted); }

  .base-price-wrap { display: flex; align-items: center; }
  .base-price-input {
    width: 72px; background: var(--surface2); border: none; border-radius: 8px;
    padding: 5px 8px; font-family: inherit; font-size: 15px;
    font-variant-numeric: tabular-nums; color: var(--ink2); text-align: right;
    -moz-appearance: textfield; transition: opacity 0.2s;
  }
  .base-price-input::-webkit-outer-spin-button, .base-price-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .base-price-input:focus { outline: 2px solid var(--blue); }
  .base-price-input.overridden { opacity: 0.3; text-decoration: line-through; }

  .icon-btn {
    width: 36px; height: 36px; aspect-ratio: 1; border-radius: 50%; border: none;
    background: var(--surface2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: var(--muted); transition: all 0.15s;
    flex-shrink: 0; position: relative;
  }
  .icon-btn::after { content: ''; position: absolute; inset: -6px; }
  .icon-btn:hover { background: var(--line); color: var(--ink); }
  .icon-btn.delete:hover { background: var(--red-bg); color: var(--red); }
  .icon-btn.link-btn:hover { color: var(--blue); }
  .icon-btn.link-btn.has-links { background: var(--blue); color: white; }
  .icon-btn.link-btn.has-links:hover { background: #0066d6; }
  .link-count-badge { font-size: 10px; font-weight: 700; margin-left: 2px; }

  /* ── Drag handle ── */
  .drag-handle { cursor: grab; color: var(--line); display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 4px 2px; touch-action: none; }
  .drag-handle:hover { color: var(--muted); }
  .drag-handle:active { cursor: grabbing; }
  .drag-ghost { opacity: 0.4; background: var(--blue-bg) !important; }

  /* ── Selected price indicator ── */
  .selected-price { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; margin-left: 6px; white-space: nowrap; }
  .price-lower { color: var(--green); }
  .price-higher { color: var(--red); }

  /* ── Search (sparkle) button ── */
  .icon-btn.search-btn { font-size: 14px; }
  .icon-btn.search-btn:hover { color: #ff9f0a; background: rgba(255,159,10,0.12); }
  .icon-btn.search-btn:disabled { opacity: 0.25; cursor: default; }
  .icon-btn.search-btn:disabled:hover { background: var(--surface2); color: var(--muted); }
  .icon-btn.search-btn.loading { pointer-events: none; overflow: hidden; }
  .icon-btn.search-btn.loading span { display: none; }
  .icon-btn.search-btn.loading::after { content: ''; position: absolute; inset: 5px; border-radius: 50%; border: 2px solid var(--line); border-top-color: var(--blue); animation: spin 0.7s linear infinite; }
  .icon-btn.search-btn.error { background: var(--red-bg); color: var(--red); }
  .icon-btn.search-btn.error:hover { background: var(--red-bg); color: var(--red); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Links panel ── */
  .links-panel { background: var(--surface2); margin: 0 12px 12px; border-radius: var(--radius-sm); padding: 14px 16px; display: none; }
  .links-panel.open { display: block; }
  .links-panel-title { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

  .link-option { display: grid; grid-template-columns: auto 1fr auto auto auto; gap: 10px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--line); }
  .link-option:last-of-type { border-bottom: none; }

  .option-radio {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--line);
    background: transparent; cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; transition: all 0.2s; position: relative;
  }
  .option-radio::after { content: ''; position: absolute; inset: -10px; }
  .option-radio:hover { border-color: var(--blue); }
  .option-radio.selected { border-color: var(--blue); background: var(--blue); }
  .option-radio.selected::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: white; display: block; position: static; inset: auto; }

  .option-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .option-label-link { font-size: 15px; font-weight: 500; color: var(--blue); text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .option-label-link:hover { text-decoration: underline; }
  .option-label-nolink { font-size: 15px; font-weight: 500; color: var(--ink); }
  .option-label-input { font-size: 15px; font-weight: 500; background: transparent; border: none; color: var(--ink); width: 100%; padding: 0; font-family: inherit; min-width: 0; }
  .option-label-input.has-url { color: var(--blue); }
  .option-label-input:focus { outline: none; }
  .option-brand { font-size: 12px; color: var(--muted); }

  .option-price-wrap { display: flex; align-items: center; }
  .option-price-input {
    width: 68px; background: var(--surface); border: none; border-radius: 6px;
    padding: 4px 8px; font-family: inherit; font-size: 14px;
    font-variant-numeric: tabular-nums; color: var(--ink); text-align: right; -moz-appearance: textfield;
  }
  .option-price-input::-webkit-outer-spin-button, .option-price-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .option-price-input:focus { outline: 2px solid var(--blue); }

  .selected-badge { font-size: 11px; font-weight: 600; color: var(--blue); background: var(--blue-bg); padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .link-del-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; line-height: 1; transition: color 0.15s; flex-shrink: 0; }
  .link-del-btn:hover { color: var(--red); }

  /* ── URL fetch button ── */
  .url-input-wrap { position: relative; display: flex; align-items: center; }
  .url-input-wrap input { flex: 1; padding-right: 32px !important; }
  .url-fetch-btn { position: absolute; right: 6px; background: none; border: none; cursor: pointer; color: var(--muted); font-size: 13px; padding: 2px 4px; border-radius: 4px; transition: color 0.15s; line-height: 1; }
  .url-fetch-btn:hover { color: var(--blue); }
  .url-fetch-btn.spinning { display: inline-block; animation: spin 0.7s linear infinite; pointer-events: none; }

  /* Add link form */
  .add-link-form { display: grid; grid-template-columns: 2fr 2fr 1fr 68px auto; gap: 8px; align-items: end; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); }
  .add-link-field { display: flex; flex-direction: column; gap: 4px; }
  .add-link-field label { font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
  .add-link-form input {
    background: var(--surface); border: 1.5px solid var(--line); border-radius: var(--radius-sm);
    padding: 7px 10px; font-family: inherit; font-size: 14px; color: var(--ink); width: 100%;
    -moz-appearance: textfield; transition: border-color 0.15s;
  }
  .add-link-form input[type="number"]::-webkit-outer-spin-button,
  .add-link-form input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .add-link-form input:focus { outline: none; border-color: var(--blue); }
  .add-link-form input::placeholder { color: var(--muted); }
  .add-link-btn {
    background: var(--blue); color: white; border: none; border-radius: var(--radius-sm);
    padding: 8px 12px; font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; white-space: nowrap; align-self: end; transition: background 0.15s;
  }
  .add-link-btn:hover { background: #0066d6; }

  /* ── Add item row ── */
  .add-item-row { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; padding: 12px 16px; align-items: center; border-top: 1px solid var(--line); }
  .add-item-row input { background: transparent; border: none; font-family: inherit; font-size: 17px; color: var(--blue); width: 100%; padding: 0; -moz-appearance: textfield; }
  .add-item-row input[type="number"]::-webkit-outer-spin-button,
  .add-item-row input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .add-item-row input:focus { outline: none; }
  .add-item-row input::placeholder { color: var(--blue); opacity: 0.7; }
  .add-item-row input[type="number"] { font-size: 15px; color: var(--muted); text-align: right; width: 68px; }
  .add-item-row input[type="number"]::placeholder { color: var(--muted); opacity: 1; }
  .add-item-btn {
    width: 28px; height: 28px; border-radius: 50%; border: none; background: var(--blue);
    color: white; font-size: 18px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s;
  }
  .add-item-btn:hover { background: #0066d6; }

  /* ── Add section ── */
  .add-section-area { margin-top: 16px; display: flex; gap: 10px; align-items: center; background: var(--surface); border-radius: var(--radius); padding: 14px 16px; }
  .add-section-area input { flex: 1; background: transparent; border: none; font-family: inherit; font-size: 17px; color: var(--blue); }
  .add-section-area input:focus { outline: none; }
  .add-section-area input::placeholder { color: var(--blue); opacity: 0.7; }
  .add-section-btn { font-size: 15px; font-weight: 600; color: var(--blue); background: none; border: none; cursor: pointer; font-family: inherit; padding: 0; white-space: nowrap; transition: opacity 0.15s; }
  .add-section-btn:hover { opacity: 0.7; }

  /* ── Footer ── */
  .sticky-footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(242,242,247,0.92);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-top: 1px solid var(--line);
    padding: 12px 24px calc(16px + env(safe-area-inset-bottom));
    display: flex; justify-content: space-between; align-items: center;
  }
  @media (prefers-color-scheme: dark) { .sticky-footer { background: rgba(28,28,30,0.92); } }
  @supports not (backdrop-filter: blur(1px)) { .sticky-footer { background: var(--bg); } }
  .footer-col { display: flex; flex-direction: column; gap: 1px; }
  .footer-col-right { text-align: right; }
  .footer-label { font-size: 13px; color: var(--muted); font-weight: 500; }
  .footer-sub { font-size: 12px; color: var(--muted); }
  .footer-save { font-size: 11px; color: var(--green); font-weight: 500; }
  .footer-total { font-size: 2rem; font-weight: 700; letter-spacing: -0.03em; color: var(--ink); font-variant-numeric: tabular-nums; }
  .footer-total-actual { font-size: 2rem; font-weight: 700; letter-spacing: -0.03em; color: var(--green); font-variant-numeric: tabular-nums; }

  /* ── Homepage ── */
  .lists-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; padding: 4px 0 24px; }
  .list-card { background: var(--surface); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; display: flex; flex-direction: column; gap: 4px; }
  .list-card:hover { transform: translateY(-2px); box-shadow: 0 4px 24px rgba(0,0,0,0.09); }
  .list-card-title { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-card-date { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .list-card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
  .list-card-open { font-size: 13px; font-weight: 600; color: var(--blue); }
  .list-card-archive { font-size: 12px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 0; font-family: inherit; transition: color 0.15s; }
  .list-card-archive:hover { color: var(--red); }
  .list-card-archived { opacity: 0.6; }
  .list-card-archived:hover { opacity: 1; }
  .new-list-card { background: transparent; border: 2px dashed rgba(0,122,255,0.25); border-radius: var(--radius); padding: 20px; cursor: pointer; font-family: inherit; font-size: 15px; font-weight: 600; color: var(--blue); transition: all 0.15s; text-align: center; min-height: 100px; display: flex; align-items: center; justify-content: center; }
  .new-list-card:hover { background: var(--blue-bg); border-color: var(--blue); }
  .homepage-empty { display: flex; flex-direction: column; align-items: center; padding: 80px 20px; text-align: center; }
  .homepage-empty h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
  .homepage-empty p { font-size: 15px; color: var(--muted); margin-bottom: 32px; }

  .back-btn { color: var(--ink2); background: var(--surface2); }

  /* ── Open URL button in link options ── */
  .option-label-row { display: flex; align-items: center; gap: 4px; min-width: 0; }
  .option-label-row .option-label-input { flex: 1; }
  .option-open-url { color: var(--muted); font-size: 12px; text-decoration: none; flex-shrink: 0; padding: 2px 3px; border-radius: 4px; transition: color 0.15s, opacity 0.15s; line-height: 1; }
  .option-open-url:hover { color: var(--blue); }

// ── Auth ──────────────────────────────────────────────────────────
function signIn() {
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => console.error(e));
}
function signOut() { auth.signOut(); }

function shareList() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = document.getElementById('share-btn');
    if (!btn) return;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Share link', 2000);
  });
}

function renderAuthUI(user, isHomepage = false) {
  const area = document.getElementById('auth-area');
  area.className = 'auth-area ' + (isHomepage ? 'auth-area--home' : 'auth-area--list');
  if (user) {
    if (isHomepage) {
      area.innerHTML = `
        <span class="auth-email">${user.email}</span>
        <button class="header-btn signout-btn" onclick="signOut()">Sign out</button>
      `;
    } else {
      area.innerHTML = `
        <span class="auth-email">${user.email}</span>
        <button class="undo-btn" id="undo-btn" onclick="undo()" style="display:none" title="Undo last deletion (⌘Z)">↩ Undo</button>
        <button class="header-btn back-btn" onclick="goHome()">← My Lists</button>
        <button class="header-btn share-btn" id="share-btn" onclick="shareList()">Share link</button>
        <button class="settings-btn" onclick="openSettings()" title="Settings">⚙️</button>
        <button class="header-btn signout-btn" onclick="signOut()">Sign out</button>
      `;
    }
  } else {
    area.innerHTML = `<button class="header-btn signin-btn" onclick="signIn()">Sign in</button>`;
  }
}

auth.onAuthStateChanged(async user => {
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  if (homeUnsubscribe) { homeUnsubscribe(); homeUnsubscribe = null; }

  if (!user) { renderAuthUI(null); showSignIn(); return; }

  const listId = getListId();
  if (!listId) {
    renderAuthUI(user, true);
    titleEl.contentEditable = 'false';
    titleEl.textContent = 'My Lists';
    document.title = 'My Lists';
    showHomepage(user.uid);
  } else {
    renderAuthUI(user, false);
    loadList(user, listId);
  }
});

function loadList(user, listId) {
  titleEl.contentEditable = 'true';
  showApp();
  unsubscribe = db.collection('lists').doc(listId).onSnapshot(async doc => {
    if (doc.metadata.hasPendingWrites) return;
    state = (doc.exists && doc.data().state) ? doc.data().state : JSON.parse(JSON.stringify(DEFAULT_STATE));
    settings = (doc.exists && doc.data().settings) ? doc.data().settings : {};
    const t = (doc.exists && doc.data().title) || 'Move-in Budget';
    if (!titleEl.matches(':focus')) { titleEl.textContent = t; document.title = t; }
    await registerListForUser(user.uid, listId, t);
    render();
  }, err => console.error('Firestore:', err));
}

// ── Homepage ──────────────────────────────────────────────────────
function goHome() {
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  const url = new URL(window.location);
  url.searchParams.delete('list');
  window.history.replaceState({}, '', url);
  const user = auth.currentUser;
  if (!user) return;
  renderAuthUI(user, true);
  titleEl.contentEditable = 'false';
  titleEl.textContent = 'My Lists';
  document.title = 'My Lists';
  document.getElementById('sticky-footer').style.display = 'none';
  showHomepage(user.uid);
}

function showHomepage(uid) {
  document.getElementById('sticky-footer').style.display = 'none';
  document.getElementById('app-container').innerHTML = '<div class="container" id="homepage-container"></div>';
  if (homeUnsubscribe) { homeUnsubscribe(); homeUnsubscribe = null; }
  homeUnsubscribe = db.collection('users').doc(uid).collection('lists')
    .onSnapshot(snap => {
      renderHomepage(uid, snap.docs.map(d => d.data()));
    }, err => console.error('Homepage:', err));
}

function renderHomepage(uid, lists) {
  const container = document.getElementById('homepage-container');
  if (!container) return;
  container.innerHTML = '';

  const active = lists.filter(l => !l.archived);
  const archived = lists.filter(l => l.archived);

  if (!active.length && !archived.length) {
    const empty = document.createElement('div');
    empty.className = 'homepage-empty';
    empty.innerHTML = `<h2>No lists yet</h2><p>Create your first list to get started.</p>`;
    const btn = document.createElement('button');
    btn.className = 'btn-primary';
    btn.textContent = 'Create list';
    btn.onclick = () => createNewList(uid);
    empty.appendChild(btn);
    container.appendChild(empty);
    return;
  }

  function makeCard(list, isArchived) {
    const card = document.createElement('div');
    card.className = 'list-card' + (isArchived ? ' list-card-archived' : '');
    const dateStr = list.createdAt?.toDate
      ? list.createdAt.toDate().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
      : '';
    const titleDiv = document.createElement('div');
    titleDiv.className = 'list-card-title';
    titleDiv.textContent = list.title || 'Untitled';
    const dateDiv = document.createElement('div');
    dateDiv.className = 'list-card-date';
    dateDiv.textContent = dateStr;
    const footer = document.createElement('div');
    footer.className = 'list-card-footer';
    if (isArchived) {
      const openSpan = document.createElement('span');
      openSpan.className = 'list-card-open';
      openSpan.textContent = 'Open →';
      const unarchiveBtn = document.createElement('button');
      unarchiveBtn.className = 'list-card-archive';
      unarchiveBtn.textContent = 'Unarchive';
      unarchiveBtn.onclick = (e) => { e.stopPropagation(); unarchiveList(uid, list.listId); };
      footer.appendChild(openSpan);
      footer.appendChild(unarchiveBtn);
    } else {
      const openSpan = document.createElement('span');
      openSpan.className = 'list-card-open';
      openSpan.textContent = 'Open →';
      const archiveBtn = document.createElement('button');
      archiveBtn.className = 'list-card-archive';
      archiveBtn.textContent = 'Archive';
      archiveBtn.onclick = (e) => { e.stopPropagation(); archiveList(uid, list.listId); };
      footer.appendChild(openSpan);
      footer.appendChild(archiveBtn);
    }
    card.appendChild(titleDiv);
    card.appendChild(dateDiv);
    card.appendChild(footer);
    card.onclick = () => openList(list.listId);
    return card;
  }

  if (active.length || !archived.length) {
    const grid = document.createElement('div');
    grid.className = 'lists-grid';
    grid.style.marginTop = '24px';
    active.forEach(list => grid.appendChild(makeCard(list, false)));
    const newCard = document.createElement('button');
    newCard.className = 'new-list-card';
    newCard.textContent = '+ New list';
    newCard.onclick = () => createNewList(uid);
    grid.appendChild(newCard);
    container.appendChild(grid);
  }

  if (archived.length) {
    const archiveSection = document.createElement('div');
    archiveSection.style.cssText = 'margin-top: 40px;';
    const archiveHeading = document.createElement('div');
    archiveHeading.className = 'section-label';
    archiveHeading.style.cssText = 'padding: 0 4px 12px; display:block;';
    archiveHeading.textContent = 'Archived';
    archiveSection.appendChild(archiveHeading);
    const archiveGrid = document.createElement('div');
    archiveGrid.className = 'lists-grid';
    archived.forEach(list => archiveGrid.appendChild(makeCard(list, true)));
    archiveSection.appendChild(archiveGrid);
    container.appendChild(archiveSection);
  }
}

async function registerListForUser(uid, listId, title) {
  const ref = db.collection('users').doc(uid).collection('lists').doc(listId);
  const doc = await ref.get();
  if (!doc.exists) {
    await ref.set({ title, listId, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
  } else if (doc.data().title !== title) {
    await ref.update({ title });
  }
}

async function createNewList(uid) {
  const listId = generateId();
  const title = 'New List';
  await db.collection('lists').doc(listId).set({
    state: [],
    title,
    settings: {},
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    createdBy: uid
  });
  await db.collection('users').doc(uid).collection('lists').doc(listId).set({
    title, listId, createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  openList(listId);
}

function openList(listId) {
  if (homeUnsubscribe) { homeUnsubscribe(); homeUnsubscribe = null; }
  setListId(listId);
  const user = auth.currentUser;
  if (!user) return;
  renderAuthUI(user, false);
  loadList(user, listId);
}

function archiveList(uid, listId) {
  db.collection('users').doc(uid).collection('lists').doc(listId).update({ archived: true })
    .catch(e => console.error('Archive failed:', e));
}

function unarchiveList(uid, listId) {
  db.collection('users').doc(uid).collection('lists').doc(listId).update({ archived: false })
    .catch(e => console.error('Unarchive failed:', e));
}

  };

// ── Undo ──────────────────────────────────────────────────────────
function pushHistory() {
  history.push(JSON.stringify(state));
  if (history.length > 20) history.shift();
  updateUndoBtn();
}

function undo() {
  if (!history.length) return;
  state = JSON.parse(history.pop());
  updateUndoBtn();
  scheduleSave();
  render();
}

function updateUndoBtn() {
  const btn = document.getElementById('undo-btn');
  if (btn) btn.style.display = history.length > 0 ? '' : 'none';
}

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'z') {
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    if (document.activeElement?.contentEditable === 'true') return;
    if (history.length) { e.preventDefault(); undo(); }
  }
});

// ── Save ──────────────────────────────────────────────────────────
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const listId = getListId();
    if (!auth.currentUser || !listId) return;
    db.collection('lists').doc(listId).update({ state }).then(() => {
      const el = document.getElementById('save-indicator');
      if (el) { el.textContent = 'Saved'; setTimeout(() => el.textContent = '', 1500); }
    }).catch(e => console.error('Save failed:', e));
  }, 600);
}

// ── Google Shopping search ────────────────────────────────────────
const REPUTABLE_RETAILERS = [
  'amazon', 'walmart', 'target', 'ikea', 'costco', 'home depot', 'best buy',
  'bestbuy', 'wayfair', 'bed bath', 'canadian tire', "hudson's bay", 'the bay',
  'london drugs', 'winners', 'homesense', 'rona', "lowe's", 'lowes',
  'williams-sonoma', 'pottery barn', 'crate and barrel', 'west elm',
  "sleep country", "leon's", 'the brick', 'cb2', 'structube', 'article'
];

function rankResults(results) {
  return results
    .map(r => {
      const rating = r.rating || 0;
      const reviews = r.reviews || 0;
      const baseScore = rating * Math.log10(reviews + 1);
      const source = (r.source || '').toLowerCase();
      const isReputable = REPUTABLE_RETAILERS.some(ret => source.includes(ret));
      return { ...r, _score: baseScore * (isReputable ? 1.5 : 1.0) };
    })
    .sort((a, b) => b._score - a._score)
    .slice(0, 3);
}

async function searchGoogleShopping(si, ii) {
  const panelKey = `${si}-${ii}`;
  loadingItems.add(panelKey);
  errorItems.delete(panelKey);
  render();

  try {
    const location = [settings.city, settings.country].filter(Boolean).join(', ');
    const budget = state[si].items[ii].basePrice;
    const params = new URLSearchParams({ q: state[si].items[ii].name });
    if (location) params.set('location', location);
    if (budget) params.set('budget', budget);

    const res = await fetch(`https://shopping-list-mauve-six.vercel.app/api/search?${params}`);
    const data = await res.json();
    console.log('SerpAPI response:', data);

    if (!res.ok) throw new Error(data.error || `SerpAPI error ${res.status}`);

    const results = data.shopping_results || [];
    if (!results.length) throw new Error('No shopping results returned');

    const top3 = rankResults(results);
    if (!state[si].items[ii].links) state[si].items[ii].links = [];
    top3.forEach(r => {
      state[si].items[ii].links.push({
        label: r.title,
        url: r.link || r.product_link || r.url || '',
        brand: r.source || '',
        price: Math.round(r.extracted_price || r.price?.extracted || 0)
      });
    });

    openPanels.add(panelKey);
    scheduleSave();
  } catch (err) {
    console.error('Search failed:', err);
    errorItems.add(panelKey);
    setTimeout(() => { errorItems.delete(panelKey); render(); }, 3000);
  } finally {
    loadingItems.delete(panelKey);
    render();
  }
}

function effectivePrice(item) {
  if (item.selectedLink !== null && item.links && item.links[item.selectedLink] != null) {
    return item.links[item.selectedLink].price || 0;
  }
  return item.basePrice || 0;
}

function updateTotal() {
  const totalEl = document.getElementById('grand-total');
  const countEl = document.getElementById('item-count');
  const actualEl = document.getElementById('actual-total');
  const purchasedCountEl = document.getElementById('purchased-count');
  if (!totalEl || !countEl) return;
  let budget = 0, budgetCount = 0, actual = 0, purchasedCount = 0;
  state.forEach(s => s.items.forEach(i => {
    budget += effectivePrice(i);
    budgetCount++;
    if (i.on) { actual += effectivePrice(i); purchasedCount++; }
  }));
  totalEl.textContent = '$' + budget.toLocaleString();
  countEl.textContent = budgetCount + ' items';
  if (actualEl) actualEl.textContent = '$' + actual.toLocaleString();
  if (purchasedCountEl) purchasedCountEl.textContent = purchasedCount + ' purchased';
}

function initSortable() {
  document.querySelectorAll('.section-card').forEach(card => {
    Sortable.create(card, {
      handle: '.drag-handle',
      draggable: '.item-wrap',
      group: 'items',
      animation: 150,
      ghostClass: 'drag-ghost',
      onEnd(evt) {
        const fromSi = parseInt(evt.from.dataset.si);
        const toSi = parseInt(evt.to.dataset.si);
        const [moved] = state[fromSi].items.splice(evt.oldIndex, 1);
        state[toSi].items.splice(evt.newIndex, 0, moved);
        scheduleSave();
        render();
      }
    });
  });
}

function addSection() {
  const input = document.getElementById('new-section-name');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
  state.push({ section: name, items: [] });
  input.value = ''; scheduleSave(); render();
  setTimeout(() => {
    const secs = document.querySelectorAll('.section');
    if (secs.length) secs[secs.length - 1].scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}
</script>
</body>
